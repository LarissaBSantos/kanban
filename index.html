<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/main.css">
    <title>Kanban</title>
</head>

<body>

    <header>
        <div><img src="img/icon-kanban.png" alt="Simbolo do Kanban"></div>
    </header>
    <main>
        <section>
            <div id="para-fazer">
                <h3>Para Fazer</h3>
                <button class="botao-adicionar" id="para-fazer-btn"><img src="img/btn-add.png" alt="Botão adicionar"></button>
            </div>
            <input class="esconder" class="nova-tarefa" type="text" id="para-fazer-input" placeholder="Nova tarefa...">
            <ul id="lista-para-fazer"></ul>
        </section>
        <section>
            <div id="fazendo">
                <h3>Fazendo</h3>
                <button class="botao-adicionar" id="fazendo-btn"><img src="img/btn-add.png" alt="Botão adicionar"></button>
            </div>
            <input class="esconder" class="nova-tarefa" type="text" id="fazendo-input" placeholder="Nova tarefa...">
            <ul id="lista-fazendo"></ul>
        </section>
        <section>
            <div id="feito">
                <h3>Feito</h3>
                <button class="botao-adicionar" id="feito-btn"><img src="img/btn-add.png" alt="Botão adicionar"></button>
            </div>
            <input class="esconder" class="nova-tarefa" type="text" id="feito-input" placeholder="Nova tarefa...">
            <ul id="lista-feito"></ul>
        </section>
    </main>
    <script type="module" src="./app.js"></script>
</body>

</html>
